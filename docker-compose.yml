services:
  db:
    image: postgres:16
    container_name: vote_oss_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vote_oss
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d vote_oss']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: vote_oss_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    profiles: ['app']
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_NAME=${NEXT_PUBLIC_APP_NAME:-Vote OSS}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        - NEXT_PUBLIC_KPI_AUTH_URL=${NEXT_PUBLIC_KPI_AUTH_URL:-http://mock-integrations:3001}
        - NEXT_PUBLIC_KPI_APP_ID=${NEXT_PUBLIC_KPI_APP_ID:-test}
    container_name: vote_oss_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Hardcoded to connect to the internal Docker network containers
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vote_oss?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_KPI_AUTH_URL=http://mock-integrations:3001
      - CAMPUS_API_URL=http://mock-integrations:3001
      - CAMPUS_INTEGRATION_API_KEY=any-random-integration-secret-api-here
      - KPI_APP_SECRET=any-random-kpi-app-secret-api-here
    ports:
      - '3000:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:3000/api/health'', res => { if (res.statusCode !== 200) process.exit(1); else process.exit(0) }).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mock-integrations:
    image: sckpi/vote-oss-mock-integrations:latest
    container_name: vote_oss_mocks
    restart: unless-stopped
    ports:
      - '3001:3001'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://localhost:3001/health'', res => process.exit(res.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
