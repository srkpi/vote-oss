name: Test & Allure Report

on:
  push:
    branches: [dev, main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      JWT_ACCESS_SECRET: test-access-secret-that-is-long-enough-32chars
      JWT_REFRESH_SECRET: test-refresh-secret-that-is-long-enough-32chars

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: Install Allure
        run: npm install -g allure

      - name: Run tests and generate report
        run: allure run -- npm test

      - name: Publish Allure report to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          publish_dir: allure-report
          keep_files: true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
